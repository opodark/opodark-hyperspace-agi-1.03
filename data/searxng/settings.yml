# SearXNG — configurazione default per HyperSpace AGI
# Questo file viene montato in /etc/searxng/settings.yml nel container.
# NON richiede modifiche per il funzionamento di base.
# Documentazione: https://docs.searxng.org/admin/settings/

use_default_settings: true

general:
  debug: false
  instance_name: "HyperSpace AGI Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

ui:
  default_locale: "it"
  query_in_title: true
  infinite_scroll: false
  default_theme: simple

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "it-IT"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json        # <-- indispensabile per il tool web_search del control-plane

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET:-hyperspace-searxng-secret}"
  base_url: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

# Engine abilitati — aggiungi o rimuovi secondo necessità
engines:
  - name: google
    engine: google
    shortcut: g
    language: "it"
    weight: 1
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    weight: 1
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    weight: 1
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: "https://it.wikipedia.org/"
    weight: 1
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    weight: 1
    disabled: false
