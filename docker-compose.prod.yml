version: '3.8'

# ============================================================
# HyperSpace AGI v1.02 — Compose PRODUZIONE
#
# Architettura a due hub:
#   Mac    → PUBLIC_ENDPOINT=https://charlesetta-haptical-unconcentratedly.ngrok-free.dev
#   Ubuntu → PUBLIC_ENDPOINT=https://sanctuary-mower-plated.ngrok-free.dev
#
# I due hub si annunciano reciprocamente via BOOT_PEERS.
# I nuovi nodi leaf usano entrambi gli URL come BOOT_PEERS.
#
# Uso:
#   Mac:    cp .env.mac .env && docker compose -f docker-compose.prod.yml up -d --build
#   Ubuntu: cp .env.ubuntu .env && docker compose -f docker-compose.prod.yml up -d --build
#
# Dashboard:  http://localhost:8085/dashboard
# Node API:   http://localhost:8084/status
# Registry:   http://localhost:8086/nodes
# ============================================================

services:

  # ── Open WebUI ──────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Nodo agente (hub su Mac/Ubuntu, leaf su altri) ──────
  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node}
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      NODE_TIER: ${NODE_TIER:-leaf}
      VRAM_GB: ${VRAM_GB:-0.0}
      SIGN_REQUESTS: ${SIGN_REQUESTS:-true}
      HEARTBEAT_EVERY: ${HEARTBEAT_EVERY:-15}
      # Endpoint pubblico di questo nodo (URL ngrok o IP pubblico)
      # Hub Mac:    https://charlesetta-haptical-unconcentratedly.ngrok-free.dev
      # Hub Ubuntu: https://sanctuary-mower-plated.ngrok-free.dev
      # Nodo leaf:  lasciare vuoto o mettere il proprio ngrok
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      # Boot peers — per i due hub: l'URL dell'altro hub
      # Per nodi leaf: entrambi gli hub separati da virgola
      #   BOOT_PEERS=https://charlesetta-haptical-unconcentratedly.ngrok-free.dev,https://sanctuary-mower-plated.ngrok-free.dev
      BOOT_PEERS: ${BOOT_PEERS:-}
      # Control-plane locale
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:8085}
      # Registry locale
      REGISTRY_URL: ${REGISTRY_URL:-http://registry:8086}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped
    depends_on:
      - registry

  # ── Control Plane + Dashboard ────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      - node
      - registry
    ports:
      - "8085:8085"
    environment:
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      AUTHORITY_ENABLED: "false"
      # URL pubblico di questo control-plane (usato da nodi remoti per registrarsi)
      # Mac:    https://charlesetta-haptical-unconcentratedly.ngrok-free.dev
      # Ubuntu: https://sanctuary-mower-plated.ngrok-free.dev
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Registry — discovery dinamico nodi ──────────────────
  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    container_name: hyperspace_registry
    ports:
      - "8086:8086"
    volumes:
      - ./data/registry:/app/data
    environment:
      REGISTRY_PORT: ${REGISTRY_PORT:-8086}
      NODE_TTL: ${NODE_TTL:-60}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama-in-Docker (legacy, opzionale) ────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  open_webui_data:
  ollama_data:
