version: '3.8'

# ============================================================
# HyperSpace AGI v0.2 — Compose PRODUZIONE
#
# Ollama NON è incluso: deve girare sull'host (nativo).
# Usa setup.sh / setup.ps1 per la configurazione guidata.
# ============================================================

services:

  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node}
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      BOOT_PEERS: ${BOOT_PEERS:-}
      NODE_TIER: ${NODE_TIER:-leaf}
      VRAM_GB: ${VRAM_GB:-0.0}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on: [node]
    ports:
      - "8085:8085"
    environment:
      # Punta al servizio 'node' dentro la rete Docker
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # Ollama-in-Docker opzionale (legacy)
  # Abilitato solo con: --profile with-ollama
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
