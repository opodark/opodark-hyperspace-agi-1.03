version: '3.8'

# ============================================================
# HyperSpace AGI v1.01 — docker-compose FULL (3 workers)
# Dashboard:   http://localhost:8085/dashboard
# Open WebUI:  http://localhost:3000
#
# Ollama routing via .env (generated by setup.sh):
#   macOS host Ollama   -> OLLAMA_URL=http://host.docker.internal:11434
#   Linux Docker Ollama -> OLLAMA_URL=http://ollama:11434
#   Linux host Ollama   -> OLLAMA_URL=http://host.docker.internal:11434
# ============================================================

services:

  nats:
    image: nats:latest
    container_name: hyperspace_nats
    ports:
      - "4222:4222"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama (CPU default) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_THREADS: "0"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama NVIDIA GPU (profile: nvidia) ─────────────
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_nvidia
    profiles: ["nvidia"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_GPU: "999"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama AMD ROCm GPU (profile: amd) ──────────────
  ollama-amd:
    image: ollama/ollama:rocm
    container_name: hyperspace_ollama_amd
    profiles: ["amd"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      OLLAMA_NUM_GPU: "999"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Intel GPU (profile: intel) ───────────────
  ollama-intel:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_intel
    profiles: ["intel"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - render
      - video
    environment:
      OLLAMA_NUM_GPU: "999"
      ZES_ENABLE_SYSMAN: "1"
      SYCL_CACHE_PERSISTENT: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Vulkan GPU (profile: vulkan) ──────────────
  ollama-vulkan:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_vulkan
    profiles: ["vulkan"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - render
      - video
    environment:
      OLLAMA_NUM_GPU: "999"
      GGML_VULKAN: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Open WebUI ───────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Authority ────────────────────────────────────────
  authority:
    build:
      context: .
      dockerfile: authority/Dockerfile
    container_name: hyperspace_authority
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
      AUTHORITY_URL: ${AUTHORITY_URL:-http://authority:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Worker 1 ─────────────────────────────────────────
  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_1
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8084:8084"
    environment:
      WORKER_ID: worker-1
      WORKER_PORT: "8084"
      AUTHORITY_URL: ${AUTHORITY_URL:-http://authority:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Worker 2 ─────────────────────────────────────────
  worker-2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_2
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8086:8084"
    environment:
      WORKER_ID: worker-2
      WORKER_PORT: "8084"
      AUTHORITY_URL: ${AUTHORITY_URL:-http://authority:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Worker 3 ─────────────────────────────────────────
  worker-3:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_3
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8087:8084"
    environment:
      WORKER_ID: worker-3
      WORKER_PORT: "8084"
      AUTHORITY_URL: ${AUTHORITY_URL:-http://authority:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
