version: '3.8'

# ============================================================
# HyperSpace AGI v1.01 — docker-compose FULL
# 3 worker nodes + tutte le opzioni GPU
# ============================================================

services:

  nats:
    image: nats:latest
    container_name: hyperspace_nats
    ports:
      - "4222:4222"
    networks:
      - hyperspace
    restart: unless-stopped

  # ---------- OLLAMA ----------

  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_THREADS: "0"
    restart: unless-stopped
    networks:
      - hyperspace

  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_nvidia
    profiles: ["nvidia"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_GPU: "999"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - hyperspace

  ollama-amd:
    image: ollama/ollama:rocm
    container_name: hyperspace_ollama_amd
    profiles: ["amd"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      OLLAMA_NUM_GPU: "999"
    restart: unless-stopped
    networks:
      - hyperspace

  ollama-intel:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_intel
    profiles: ["intel"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - render
      - video
    environment:
      OLLAMA_NUM_GPU: "999"
      ZES_ENABLE_SYSMAN: "1"
      SYCL_CACHE_PERSISTENT: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  ollama-vulkan:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_vulkan
    profiles: ["vulkan"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - render
      - video
    environment:
      OLLAMA_NUM_GPU: "999"
      GGML_VULKAN: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ---------- AUTHORITY ----------

  authority:
    build:
      context: .
      dockerfile: authority/Dockerfile
    container_name: hyperspace_authority
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  # ---------- CONTROL PLANE ----------

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
    networks:
      - hyperspace
    restart: unless-stopped

  # ---------- WORKERS ----------

  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_1
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8084:8084"
    environment:
      WORKER_ID: worker-1
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  worker-2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_2
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8086:8084"
    environment:
      WORKER_ID: worker-2
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  worker-3:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_3
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8087:8084"
    environment:
      WORKER_ID: worker-3
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
