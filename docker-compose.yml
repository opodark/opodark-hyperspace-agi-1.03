# ============================================================
# HyperSpace AGI v1.02 — Compose Unico
#
# USAGE — scegli UN solo profilo GPU alla volta:
#
#   Nessun profilo (usa LM Studio o Ollama nativo sull'host):
#     docker compose up -d
#
#   Ollama CPU nel container:
#     docker compose --profile cpu up -d
#
#   Ollama NVIDIA GPU:
#     docker compose --profile nvidia up -d
#
#   Ollama AMD ROCm:
#     docker compose --profile amd up -d
#
#   Ollama Intel GPU:
#     docker compose --profile intel up -d
#
#   Ollama Vulkan:
#     docker compose --profile vulkan up -d
#
# Dashboard:  http://localhost:8085/dashboard
# Registry:   http://localhost:8086/nodes
# Node 1:     http://localhost:8081
# Landing:    https://sanctuary-mower-plated.ngrok-free.dev
# ============================================================

services:

  # ── Registry — discovery dinamico dei nodi ──────────
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: hyperspace_registry
    ports:
      - "${REGISTRY_PORT:-8086}:8086"
    environment:
      REGISTRY_PORT: "${REGISTRY_PORT:-8086}"
      NODE_TTL: "${NODE_TTL:-300}"
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ollama CPU (profile: cpu) ────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["cpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_THREADS: "0"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama NVIDIA GPU (profile: nvidia) ─────────────
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_nvidia
    profiles: ["nvidia"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_GPU: "999"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama AMD ROCm (profile: amd) ──────────────────
  ollama-amd:
    image: ollama/ollama:rocm
    container_name: hyperspace_ollama_amd
    profiles: ["amd"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add: [video, render]
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      OLLAMA_NUM_GPU: "999"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Intel GPU (profile: intel) ───────────────
  ollama-intel:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_intel
    profiles: ["intel"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add: [render, video]
    environment:
      OLLAMA_NUM_GPU: "999"
      ZES_ENABLE_SYSMAN: "1"
      SYCL_CACHE_PERSISTENT: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Vulkan GPU (profile: vulkan) ──────────────
  ollama-vulkan:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_vulkan
    profiles: ["vulkan"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add: [render, video]
    environment:
      OLLAMA_NUM_GPU: "999"
      GGML_VULKAN: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Open WebUI ───────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:1234}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-key-32chars-ok!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      registry:
        condition: service_healthy
      node-1:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
      NODE_ENDPOINTS: "${NODE_ENDPOINTS:-node-1:8084}"
      REGISTRY_URL: "http://registry:8086"
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:1234}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-lmstudio}
      MEMORY_TTL_DAYS: "${MEMORY_TTL_DAYS:-7}"
      MEMORY_MAX_ENTRIES: "${MEMORY_MAX_ENTRIES:-200}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Nodo 1 ───────────────────────────────────────────
  node-1:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node_1
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "8081:8084"
    volumes:
      - ./data/node-1:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node-1}
      NODE_PORT: "8084"
      NODE_TIER: ${NODE_TIER:-leaf}
      DATA_DIR: /app/data
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      BOOT_PEERS: ${BOOT_PEERS:-}
      REGISTRY_URL: "http://registry:8086"
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-}
      HEARTBEAT_EVERY: "${HEARTBEAT_EVERY:-15}"
      PEER_MAX_AGE_S: "${PEER_MAX_AGE_S:-120}"
      NODE_TTL: "${NODE_TTL:-300}"
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:1234}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-lmstudio}
      VRAM_GB: ${VRAM_GB:-0.0}
      SIGN_REQUESTS: ${SIGN_REQUESTS:-true}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

