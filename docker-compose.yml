version: '3.8'

# ============================================================
# HyperSpace AGI v1.01 — Compose Unico
# Tutti i nodi usano la stessa immagine.
# Il tier (root/hub/leaf) viene calcolato al boot — non hardcodato.
# Discovery dinamica tramite Registry (http://registry:8086)
# Fallback: BOOT_PEERS P2P tramite /announce.
#
# Dashboard control-plane: http://localhost:8085/dashboard
# Registry API:            http://localhost:8086/nodes
# Node 1:                  http://localhost:8081
# Node 2:                  http://localhost:8082
#
# Per aggiungere un nodo: copia node-2, rinomina in node-3,
# aggiorna porta host. Nessun hardcoding di indirizzi richiesto.
# ============================================================

services:

  # ── Registry — discovery dinamico dei nodi ──────────
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: hyperspace_registry
    ports:
      - "${REGISTRY_PORT:-8086}:8086"
    environment:
      REGISTRY_PORT: "${REGISTRY_PORT:-8086}"
      NODE_TTL: "${NODE_TTL:-60}"
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Ollama (CPU default) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_THREADS: "0"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama NVIDIA GPU (profile: nvidia) ─────────────
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_nvidia
    profiles: ["nvidia"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_GPU: "999"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama AMD ROCm (profile: amd) ──────────────────
  ollama-amd:
    image: ollama/ollama:rocm
    container_name: hyperspace_ollama_amd
    profiles: ["amd"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add: [video, render]
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      OLLAMA_NUM_GPU: "999"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Intel GPU (profile: intel) ───────────────
  ollama-intel:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_intel
    profiles: ["intel"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add: [render, video]
    environment:
      OLLAMA_NUM_GPU: "999"
      ZES_ENABLE_SYSMAN: "1"
      SYCL_CACHE_PERSISTENT: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Ollama Vulkan GPU (profile: vulkan) ──────────────
  ollama-vulkan:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama_vulkan
    profiles: ["vulkan"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add: [render, video]
    environment:
      OLLAMA_NUM_GPU: "999"
      GGML_VULKAN: "1"
    restart: unless-stopped
    networks:
      - hyperspace

  # ── Open WebUI ───────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    depends_on: [ollama]
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      registry:
        condition: service_healthy
      node-1:
        condition: service_started
      node-2:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
      NODE_ENDPOINTS: "node-1:8084,node-2:8084"
      REGISTRY_URL: "http://registry:8086"
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # NODI — stessa immagine, tier calcolato al boot
  # Per aggiungere un nodo: copia node-2, rinomina in node-3,
  # aggiorna porta host. Il nodo si auto-registra al registry.
  # ─────────────────────────────────────────────

  node-1:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node_1
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "8081:8084"
    volumes:
      - ./data/node-1:/app/data
    environment:
      NODE_HOSTNAME: node-1
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      REGISTRY_URL: "http://registry:8086"
      HEARTBEAT_INTERVAL: "${HEARTBEAT_INTERVAL:-30}"
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      BOOT_PEERS: "node-2:8084"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  node-2:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node_2
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "8082:8084"
    volumes:
      - ./data/node-2:/app/data
    environment:
      NODE_HOSTNAME: node-2
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      REGISTRY_URL: "http://registry:8086"
      HEARTBEAT_INTERVAL: "${HEARTBEAT_INTERVAL:-30}"
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      BOOT_PEERS: "node-1:8084"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
